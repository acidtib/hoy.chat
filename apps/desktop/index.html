<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hoy Desktop</title>
    <script>
      (() => {
        const root = document.documentElement;
        let theme = "dark";
        try {
          const raw = localStorage.getItem("hoy.prefs");
          const parsed = raw ? JSON.parse(raw) : null;
          theme = parsed?.state?.theme ?? theme;
        } catch {
          theme = "dark";
        }
        const dark =
          theme === "dark" ||
          (theme === "system" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        root.classList.toggle("dark", dark);
        root.style.colorScheme = dark ? "dark" : "light";
        root.style.backgroundColor = dark ? "#0e0e10" : "#ffffff";
      })();
    </script>
    <!-- Pre-stylesheet paint fallback. The script above sets the user theme
         before CSS loads; this covers script-disabled startup. -->
    <style>
      html {
        background-color: #0e0e10;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

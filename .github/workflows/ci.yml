name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: install frontend dependencies
        run: bun install

      # externalBin/resources reference the sidecar artifacts; build them so the
      # tauri config resolves and the live-test fixtures exist. Hermetic tests do
      # not need the binary, but building keeps CI aligned with a real build.
      - name: build sidecar
        run: bash sidecar/build.sh

      - name: typecheck, rust check, clippy, fmt
        run: bun run check

      - name: frontend tests
        run: bun test

      - name: rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

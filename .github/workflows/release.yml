name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
            triple: aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            tauri_script: ''
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
            triple: x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            tauri_script: ''
          - platform: ubuntu-22.04
            # --verbose is a documented workaround: without it, linuxdeploy's
            # AppImage step fails on the CI runner (tauri-apps/tauri#14796).
            args: '--verbose'
            triple: x86_64-unknown-linux-gnu
            rust_targets: ''
            # Linux builds through a wrapper that shelters + repacks the bun
            # sidecar so the AppImage's sidecar is not corrupted (HOY-217).
            # tauri-action execs tauriScript directly via execa with cwd set to
            # projectPath (apps/desktop) - no shell, so neither $GITHUB_WORKSPACE
            # nor ${{ github.workspace }} expand there (the latter is also empty
            # this early: matrix.include is evaluated before a runner - and thus
            # github.workspace - exists). A path relative to apps/desktop avoids
            # both problems.
            tauri_script: 'bash ../../scripts/linux/build-appimage.sh'
          - platform: windows-latest
            args: ''
            triple: x86_64-pc-windows-msvc
            rust_targets: ''
            tauri_script: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: install system dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./apps/desktop/src-tauri -> target

      - name: install frontend dependencies
        run: bun install

      # externalBin is validated when tauri build evaluates the config, so the
      # per-triple sidecar binary must exist first. bash runs build.sh under Git
      # Bash on the Windows runner.
      - name: build sidecar
        shell: bash
        run: bash packages/sidecar/build.sh ${{ matrix.triple }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AppImage bundling workarounds (Linux-only, ignored elsewhere). The
          # Linux updater consumes the AppImage; deb/rpm are not auto-updatable.
          # - extract-and-run: linuxdeploy is an AppImage, runner has no FUSE2.
          # - NO_STRIP: linuxdeploy's strip rejects modern .relr.dyn sections
          #   (tauri-apps/tauri#14755). Harmless on glibc 2.35 runners.
          APPIMAGE_EXTRACT_AND_RUN: '1'
          NO_STRIP: 'true'
          # Updater signing (HOY-187). Add these as repo secrets; without them the
          # build still produces installers but no signed updater artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The Tauri app lives under apps/desktop in the monorepo layout; run
          # tauri-action there so it finds src-tauri and the beforeBuildCommand.
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Hoy Desktop ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # Empty on macOS/Windows (tauri-action auto-detects the build command);
          # Linux runs the shelter+repack wrapper (HOY-217).
          tauriScript: ${{ matrix.tauri_script }}

name: Deploy site

# Build apps/site (Next static export) and deploy to Cloudflare Pages on every
# push to main that touches the site. Inert until these repo secrets exist:
#   CLOUDFLARE_API_TOKEN    token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID   the target Cloudflare account id
# The Pages project (hoy-site) and the dev.hoy.chat custom domain are configured
# once in the Cloudflare dashboard; this workflow only uploads new builds.
on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - uses: oven-sh/setup-bun@v2

      - name: install dependencies
        run: bun install

      # GITHUB_TOKEN authenticates the build-time GitHub Releases fetch so the
      # version and changelog resolve without hitting the unauthenticated rate
      # limit on shared runners (lib/releases.ts).
      - name: build site
        working-directory: apps/site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build

      # --branch=main marks this a production deployment, so the dev.hoy.chat
      # custom domain serves it (non-production branches get preview URLs).
      - name: deploy to cloudflare pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/site/out --project-name=hoy-site --branch=main

name: Site deploy

# hoy.chat bakes the changelog and download version from GitHub Releases at build
# time. Publishing a release does not touch main, so the live site would keep
# showing the old version until an unrelated commit. This pings a Cloudflare Pages
# deploy hook so a release rebuilds the site and picks itself up. It also fires on
# a push to main that touches the site (apps/site) so site changes go live without
# waiting for a release.
#
# Inert until this repo secret exists:
#   CLOUDFLARE_DEPLOY_HOOK_URL   Pages > Settings > Builds & deployments > Deploy hooks
on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: trigger Cloudflare Pages rebuild
        env:
          HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK_URL not set; skipping."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" > /dev/null
          echo "Triggered Cloudflare Pages deploy."
